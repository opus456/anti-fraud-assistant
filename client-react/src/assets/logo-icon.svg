<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title>御见 徽标图标</title>
  <desc>Shield + Eye icon for YU JIAN (logo icon)</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0EA5FF"/>
      <stop offset="1" stop-color="#007AFF"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#085BAF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Shield base -->
  <g fill="none" fill-rule="evenodd">
    <path d="M256 40 C360 40 432 104 432 176 C432 312 336 388 256 456 C176 388 80 312 80 176 C80 104 152 40 256 40 Z"
          fill="url(#g)" filter="url(#shadow)"/>

    <!-- subtle inner highlight -->
    <path d="M256 72 C340 72 400 126 400 184 C400 293 324 356 256 412 C188 356 112 293 112 184 C112 126 172 72 256 72 Z"
          fill="url(#eyeGrad)" opacity="0.06"/>

    <!-- eye white background (almond) -->
    <path d="M106 220 C106 140 406 140 406 220 C406 300 106 300 106 220 Z"
          fill="#FFFFFF"/>

    <!-- colored iris shape -->
    <path d="M126 220 C126 160 386 160 386 220 C386 280 126 280 126 220 Z"
          fill="url(#g)" opacity="0.95" transform="translate(0,4)"/>

    <!-- pupil -->
    <circle cx="256" cy="220" r="40" fill="#06375A"/>
    <!-- small highlight on pupil -->
    <circle cx="270" cy="206" r="10" fill="#FFFFFF" opacity="0.95"/>

    <!-- vertical fold line to mimic original logo shading -->
    <path d="M256 64 L256 448" stroke="rgba(0,0,0,0.06)" stroke-width="6" stroke-linecap="round"/>

    <!-- thin outer border -->
    <path d="M256 64 C335 64 392 112 392 176 C392 290 332 356 256 420 C180 356 120 290 120 176 C120 112 177 64 256 64 Z"
          stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="8" fill="none" stroke-linejoin="round"/>
  </g>
</svg>
