# 反诈智能体助手 - 生产环境 Docker Compose
# 使用方法: docker compose -f docker-compose.prod.yml up -d
# 查看日志: docker compose -f docker-compose.prod.yml logs -f [service-name]
# 停止服务: docker compose -f docker-compose.prod.yml down

services:
  # ==================== 基础设施 ====================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: antifraud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-antifraud}
      POSTGRES_USER: ${POSTGRES_USER:-antifraud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-antifraud123}
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB"
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-antifraud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - antifraud-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: antifraud-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - antifraud-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== 应用服务 ====================
  python-backend:
    build:
      context: ./server-python
      dockerfile: Dockerfile
      cache_from:
        - python:3.11-slim
    container_name: antifraud-python
    restart: unless-stopped
    environment:
      # 数据库
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-antifraud}:${POSTGRES_PASSWORD:-antifraud123}@postgres:5432/${POSTGRES_DB:-antifraud}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      # 安全
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-please}
      DEBUG: ${DEBUG:-false}
      # LLM 配置
      USE_LOCAL_LLM: ${USE_LOCAL_LLM:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-https://api-ai.gitcode.com/v1/chat/completions}
      # Embedding
      EMBEDDING_API_URL: ${EMBEDDING_API_URL:-https://api-ai.gitcode.com/v1}
      ACCESS_TOKEN: ${ACCESS_TOKEN:-}
      # Node.js 网关
      NODE_GATEWAY_URL: http://gateway:3001
      # 时区
      TZ: Asia/Shanghai
      # Python 优化
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    ports:
      - "8000:8000"
    volumes:
      - python-uploads:/app/uploads
      - ./server-python/test_data:/app/test_data:ro
      - ./server-python/knowledge_data:/app/knowledge_data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - antifraud-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  gateway:
    build:
      context: ./server-node
      dockerfile: Dockerfile
      cache_from:
        - node:20-alpine
    container_name: antifraud-gateway
    restart: unless-stopped
    environment:
      PORT: 3001
      PYTHON_API: http://python-backend:8000
      JWT_SECRET: ${SECRET_KEY:-change-this-in-production-please}
      NODE_ENV: production
      TZ: Asia/Shanghai
      # Node.js 优化
      NODE_OPTIONS: "--max-old-space-size=512"
    ports:
      - "3001:3001"
    depends_on:
      python-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - antifraud-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./client-react
      dockerfile: Dockerfile
      cache_from:
        - node:20-alpine
        - nginx:alpine
    container_name: antifraud-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - antifraud-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==================== 数据卷 ====================
volumes:
  pgdata:
    name: antifraud-pgdata
    driver: local
  redisdata:
    name: antifraud-redisdata
    driver: local
  python-uploads:
    name: antifraud-uploads
    driver: local

# ==================== 网络 ====================
networks:
  antifraud-network:
    name: antifraud-network
    driver: bridge
